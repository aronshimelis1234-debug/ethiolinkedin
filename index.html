<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio LinkedIn Renting</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="fixed top-4 right-4 z-50">
        <button onclick="setLanguage('am')" class="bg-white px-3 py-1 rounded shadow text-sm font-bold border">አማርኛ</button>
        <button onclick="setLanguage('en')" class="bg-white px-3 py-1 rounded shadow text-sm font-bold border">English</button>
    </div>

    <header class="bg-[#0077b5] text-white py-6 shadow-md text-center">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-3xl font-bold" data-am="Ethio LinkedIn Renting" data-en="Ethio LinkedIn Renting">Ethio LinkedIn Renting</h1>
            <p class="text-blue-100 mt-1" data-am="የእርስዎን የሊንክዲን አካውንት አከራይተው በየሳምንቱ ተከፋይ ይሁኑ!" data-en="Rent your LinkedIn account and get paid weekly!">የእርስዎን የሊንክዲን አካውንት አከራይተው በየሳምንቱ ተከፋይ ይሁኑ!</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <section class="bg-white rounded-2xl p-6 shadow-md border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center" data-am="አካውንትዎን ያከራዩ" data-en="Rent your account">አካውንትዎን ያከራዩ</h2>
            
            <form id="rentalForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700" data-am="ሙሉ ስም" data-en="Full Name">ሙሉ ስም</label>
                    <input type="text" id="fullName" class="w-full px-4 py-2 rounded-lg border">
                </div>
                <button type="button" onclick="sendToTelegram()" class="w-full bg-[#0077b5] text-white font-bold py-3 rounded-lg" data-am="መረጃውን በቴሌግራም ላክ" data-en="Send via Telegram">መረጃውን በቴሌግራም ላክ</button>
            </form>
        </section>
    </main>

    <script>
        function setLanguage(lang) {
            document.querySelectorAll('[data-' + lang + ']').forEach(el => {
                el.innerText = el.getAttribute('data-' + lang);
            });
        }
    </script>
</body>
</html>
