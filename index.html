<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio LinkedIn Renting</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- የቋንቋ ምርጫ (Language Switcher) -->
    <div class="fixed top-2 right-2 z-50 flex gap-1">
        <button onclick="setLanguage('am')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">አማ</button>
        <button onclick="setLanguage('en')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">EN</button>
        <button onclick="setLanguage('ti')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">ትግ</button>
        <button onclick="setLanguage('om')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">ኦሮ</button>
    </div>

    <!-- Header -->
    <header class="bg-[#0077b5] text-white py-6 shadow-md text-center">
        <div class="max-w-4xl mx-auto px-4">
            <img src="IMG_20260619_121402_550.jpg" alt="Ethio LinkedIn Logo" class="w-24 h-24 mx-auto rounded-full border-4 border-white object-cover mb-3 shadow-lg">
            <h1 class="text-3xl font-bold tracking-wide">Ethio LinkedIn Renting</h1>
            <p class="text-blue-100 mt-1" data-lang='{"am":"የእርስዎን የሊንክዲን አካውንት አከራይተው በየሳምንቱ ተከፋይ ይሁኑ!","en":"Rent your LinkedIn account and get paid weekly!","ti":"ናይ ሊንክዲን አካውንትኩም ኣካርዩን በየሰሙኑ ተኸፋሊ ኩኑን!","om":"Akkaawuntii keessan kireessaa torban keessatti kafaltii argadhaa!"}'>የእርስዎን የሊንክዲን አካውንት አከራይተው በየሳምንቱ ተከፋይ ይሁኑ!</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- የመመሪያዎች ክፍል -->
        <section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8">
            <h2 class="text-xl font-bold text-[#0077b5] mb-4 flex items-center gap-2" data-lang='{"am":"መሟላት ያለባቸው መስፈርቶች እና ጥንቃቄዎች","en":"Requirements and Precautions","ti":"ረቂቅን ጥንቃቄን","om":"Qajeelfama"}'>
                <i class="fas fa-info-circle"></i> መሟላት ያለባቸው መስፈርቶች እና ጥንቃቄዎች
            </h2>
            <div class="grid md:grid-cols-2 gap-4 text-sm">
                <div class="space-y-3">
                    <div class="flex items-start gap-2">
                        <i class="fas fa-check-circle text-green-500 mt-1"></i>
                        <p data-lang='{"am":"ቢያንስ 100+ ኮኔክሽን (Connections) ሊኖረው ይገባል።","en":"At least 100+ connections.","ti":"ትካለ 100+ ኮኔክሽን ዘለዎ።","om":"Connnection 100+ qabaachuu qaba."}'>ቢያንስ 100+ ኮኔክሽን (Connections) ሊኖረው ይገባል።</p>
                    </div>
                    <div class="flex items-start gap-2">
                        <i class="fas fa-exclamation-triangle text-amber-500 mt-1"></i>
                        <p data-lang='{"am":"Weekly Connection Limit የሌለው ወይም ያልበራበት።","en":"No Weekly Connection Limit.","ti":"Weekly Connection Limit ዘይብሉ።","om":"Weekly Connection Limit kan hin qabne."}'>Weekly Connection Limit የሌለው ወይም ያልበራበት መሆን አለበት።</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="flex items-start gap-2">
                        <i class="fas fa-lock text-red-500 mt-1"></i>
                        <p data-lang='{"am":"የይለፍ ቃል ሲሰጡ ትክክለኛ መሆኑን ያረጋግጡ።","en":"Verify password before submitting.","ti":"ፓስዎርድኩም ኣረጋግጹ።","om":"Password keessan mirkaneessaa."}'>የይለፍ ቃልዎ ትክክለኛ መሆኑን ያረጋግጡ።</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- የምዝገባ ፎርም -->
        <section class="bg-white rounded-2xl p-6 shadow-md border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center" data-lang='{"am":"አካውንትዎን ያከራዩ","en":"Rent your account","ti":"አካውንትኩም ኣካርዩ","om":"Akkaawuntii keessan kireessaa"}'>አካውንትዎን ያከራዩ</h2>
            <button type="button" onclick="sendToTelegram()" class="w-full bg-[#0077b5] text-white font-bold py-3 rounded-lg" data-lang='{"am":"መረጃውን በቴሌግራም ላክ","en":"Send via Telegram","ti":"ሓበሬታ ብቴሌግራም ለኣኽ","om":"Odeeffannoo Telegraamin ergii"}'>መረጃውን በቴሌግራም ላክ</button>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 py-6 text-center text-xs mt-12">
        <img src="Screenshot_20230616_074134_Resume Maker.jpg" class="w-12 h-12 mx-auto rounded-full border-2 border-gray-500 mb-2">
        <p>&copy; 2026 Ethio LinkedIn Renting. Aron Shimelis Belete</p>
    </footer>

    <script>
        function setLanguage(lang) {
            document.querySelectorAll('[data-lang]').forEach(el => {
                const translations = JSON.parse(el.getAttribute('data-lang'));
                if (translations[lang]) {
                    el.innerText = translations[lang];
                }
            });
        }
    </script>
</body>
</html>
