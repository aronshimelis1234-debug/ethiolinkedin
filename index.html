<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio LinkedIn Renting</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4">

    <div class="flex gap-2 justify-center mb-6">
        <button onclick="setLanguage('am')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">አማ</button>
        <button onclick="setLanguage('en')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">EN</button>
        <button onclick="setLanguage('ti')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">ትግ</button>
        <button onclick="setLanguage('om')" class="bg-white px-2 py-1 rounded shadow text-xs font-bold border">ኦሮ</button>
    </div>

    <header class="bg-[#0077b5] text-white py-6 shadow-md text-center rounded-2xl mb-6">
        <h1 class="text-2xl font-bold">Ethio LinkedIn Renting</h1>
    </header>

    <div class="max-w-xl mx-auto space-y-6">
        <section class="bg-white p-6 rounded-2xl shadow-sm border">
            <h2 id="reqTitle" class="text-xl font-bold text-[#0077b5] mb-4" data-am="መስፈርቶች እና ጥንቃቄዎች" data-en="Requirements" data-ti="ረቂቅ" data-om="Qajeelfama">መስፈርቶች እና ጥንቃቄዎች</h2>
            <ul id="reqList" class="text-sm space-y-2">
                <li data-am="• ቢያንስ 100+ ኮኔክሽን ያለው" data-en="• 100+ Connections" data-ti="• 100+ ኮኔክሽን ዘለዎ" data-om="• 100+ Connections qabu"></li>
                <li data-am="• Weekly Limit የሌለው" data-en="• No Weekly Limit" data-ti="• Weekly Limit ዘይብሉ" data-om="• Weekly Limit kan hin qabne"></li>
                <li data-am="• ፓስዎርድ ትክክል መሆኑን ያረጋግጡ" data-en="• Verify password" data-ti="• ፓስዎርድኩም ኣረጋግጹ" data-om="• Password mirkaneessaa"></li>
            </ul>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border">
            <input type="text" id="fullName" class="w-full p-3 border rounded-lg mb-4" placeholder="Full Name / ስም">
            <button id="sendBtn" onclick="sendToTelegram()" class="w-full bg-[#0077b5] text-white py-3 rounded-lg font-bold" data-am="መረጃውን ላክ" data-en="Send Info" data-ti="ሓበሬታ ለኣኽ" data-om="Odeeffannoo ergii">መረጃውን ላክ</button>
        </section>
    </div>

    <script>
        function setLanguage(lang) {
            // ርዕስ መቀየር
            const title = document.getElementById('reqTitle');
            title.innerText = title.getAttribute('data-' + lang);
            
            // ዝርዝር መቀየር
            const items = document.querySelectorAll('#reqList li');
            items.forEach(el => el.innerText = el.getAttribute('data-' + lang));
            
            // ቁልፍ መቀየር
            const btn = document.getElementById('sendBtn');
            btn.innerText = btn.getAttribute('data-' + lang);
        }

        function sendToTelegram() {
            const name = document.getElementById('fullName').value;
            window.open("https://t.me/Ethiolinkedin12?text=" + encodeURIComponent("አዲስ ምዝገባ: " + name), '_blank');
        }
    </script>
</body>
</html>
